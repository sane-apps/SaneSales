name: SaneSales
options:
  bundleIdPrefix: com.sanesales
  deploymentTarget:
    macOS: 14.0
    iOS: 17.0
    watchOS: 10.0
  xcodeVersion: 16.0

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
  SaneUI:
    url: https://github.com/sane-apps/SaneUI.git
    branch: main

configs:
  Debug: debug
  Release: release
  Release-AppStore: release

settings:
  DEAD_CODE_STRIPPING: YES
  SWIFT_EMIT_LOC_STRINGS: YES
  ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  ENABLE_HARDENED_RUNTIME: YES
  GENERATE_INFOPLIST_FILE: YES
  CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
  CLANG_WARN_BOOL_CONVERSION: YES
  CLANG_WARN_COMMA: YES
  CLANG_WARN_CONSTANT_CONVERSION: YES
  CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
  CLANG_WARN_EMPTY_BODY: YES
  CLANG_WARN_ENUM_CONVERSION: YES
  CLANG_WARN_INFINITE_RECURSION: YES
  CLANG_WARN_INT_CONVERSION: YES
  CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
  CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
  CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
  CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
  CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
  CLANG_WARN_STRICT_PROTOTYPES: YES
  CLANG_WARN_SUSPICIOUS_MOVE: YES
  CLANG_WARN_UNREACHABLE_CODE: YES
  CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
  ENABLE_STRICT_OBJC_MSGSEND: YES
  GCC_NO_COMMON_BLOCKS: YES
  GCC_WARN_64_TO_32_BIT_CONVERSION: YES
  GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
  GCC_WARN_UNDECLARED_SELECTOR: YES
  GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
  GCC_WARN_UNUSED_FUNCTION: YES
  GCC_WARN_UNUSED_VARIABLE: YES
  SWIFT_STRICT_CONCURRENCY: complete

schemes:
  SaneSales:
    build:
      targets:
        SaneSales: all
        SaneSalesTests: [test]
        SaneSalesWidgets: all
    test:
      targets:
        - SaneSalesTests
    profile:
      config: Release
    run:
      config: Debug
    archive:
      config: Release

  SaneSalesIOS:
    build:
      targets:
        SaneSalesIOS: all
        SaneSalesIOSWidgets: all
    test:
      targets:
        - SaneSalesIOSTests
        - SaneSalesIOSUITests
    profile:
      config: Release
    run:
      config: Debug
    archive:
      config: Release-AppStore

  SaneSales-AppStore:
    build:
      targets:
        SaneSalesAppStore: all
        SaneSalesWidgets: all
    profile:
      config: Release-AppStore
    run:
      config: Debug
    archive:
      config: Release-AppStore

  SaneSalesWatch:
    build:
      targets:
        SaneSalesWatch: all
        SaneSalesWatchWidgets: all
    profile:
      config: Release
    run:
      config: Debug
    archive:
      config: Release-AppStore

targets:
  # macOS App
  SaneSales:
    type: application
    platform: macOS
    bundleId: com.sanesales.app
    deploymentTarget:
      macOS: 14.0
    sources:
      - path: Core
        excludes:
          - "**/CLAUDE.md"
      - path: macOS
        excludes:
          - "**/CLAUDE.md"
      - path: iOS
        excludes:
          - "Info.plist"
          - "SaneSalesApp.swift"
          - "**/CLAUDE.md"
      - Resources
    dependencies:
      - package: Sparkle
      - package: SaneUI
      - target: SaneSalesWidgets
        embed: true
        codeSign: true
    entitlements:
      path: SaneSales/SaneSales.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spki"
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spks"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.sanesales.app"
        com.apple.security.application-groups:
          - "group.com.sanesales.app"
    info:
      path: SaneSales/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: "public.app-category.finance"
        CFBundleDisplayName: SaneSales
        AppStoreProductID: "com.sanesales.app.pro.unlock.v2"
        UIPrefersShowingLanguageSettings: true
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUEnableInstallerLauncherService: true
        SUFeedURL: "https://sanesales.com/appcast.xml"
        SUPublicEDKey: "7Pl/8cwfb2vm4Dm65AByslkMCScLJ9tbGlwGGx81qYU="
    settings:
      base:
        PRODUCT_NAME: SaneSales
        PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
        MARKETING_VERSION: "1.2.6"
        CURRENT_PROJECT_VERSION: "1206"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: 14.0
        ARCHS: arm64
        VALID_ARCHS: arm64
        DEVELOPMENT_TEAM: M78L6FXD48
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.dev
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "SaneSales Developer ID"
          INFOPLIST_KEY_SUFeedURL: "https://sanesales.com/appcast.xml"
          INFOPLIST_KEY_SUPublicEDKey: "7Pl/8cwfb2vm4Dm65AByslkMCScLJ9tbGlwGGx81qYU="
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneSales Mac App Store"
          CODE_SIGN_ENTITLEMENTS: SaneSales/SaneSales-AppStore.entitlements
          OTHER_SWIFT_FLAGS: "-D APP_STORE"
          INFOPLIST_KEY_SUFeedURL: ""
          INFOPLIST_KEY_SUPublicEDKey: ""
    postCompileScripts:
      - script: |
          if which swiftlint >/dev/null; then
            swiftlint lint --quiet --cache-path "${SRCROOT}/.swiftlint-cache" "${SRCROOT}/Core" "${SRCROOT}/iOS" "${SRCROOT}/macOS" "${SRCROOT}/Widgets" "${SRCROOT}/Tests" || true
          else
            echo "warning: SwiftLint not installed"
          fi
        name: Run SwiftLint
        basedOnDependencyAnalysis: false

  SaneSalesAppStore:
    type: application
    platform: macOS
    bundleId: com.sanesales.app
    deploymentTarget:
      macOS: 14.0
    sources:
      - path: Core
        excludes:
          - "**/CLAUDE.md"
      - path: macOS
        excludes:
          - "**/CLAUDE.md"
      - path: iOS
        excludes:
          - "Info.plist"
          - "SaneSalesApp.swift"
          - "**/CLAUDE.md"
      - Resources
    dependencies:
      - package: SaneUI
      - target: SaneSalesWidgets
        embed: true
        codeSign: true
    entitlements:
      path: SaneSales/SaneSales-AppStore.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.sanesales.app"
        com.apple.security.application-groups:
          - "group.com.sanesales.app"
    info:
      path: SaneSales/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: "public.app-category.finance"
        CFBundleDisplayName: SaneSales
        AppStoreProductID: "com.sanesales.app.pro.unlock.v2"
        UIPrefersShowingLanguageSettings: true
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_NAME: SaneSales
        PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
        MARKETING_VERSION: "1.2.6"
        CURRENT_PROJECT_VERSION: "1206"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: 14.0
        ARCHS: arm64
        VALID_ARCHS: arm64
        DEVELOPMENT_TEAM: M78L6FXD48
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
        OTHER_SWIFT_FLAGS: "$(inherited) -D APP_STORE"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_ENTITLEMENTS: SaneSales/SaneSales-AppStore.entitlements
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_ENTITLEMENTS: SaneSales/SaneSales-AppStore.entitlements
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneSales Mac App Store"
          CODE_SIGN_ENTITLEMENTS: SaneSales/SaneSales-AppStore.entitlements

  # macOS Tests
  SaneSalesTests:
    type: bundle.unit-test
    platform: macOS
    bundleId: com.sanesales.appTests
    deploymentTarget:
      macOS: 14.0
    testTarget: SaneSales
    sources:
      - Tests
    dependencies:
      - target: SaneSales
    settings:
      base:
        DEVELOPMENT_TEAM: M78L6FXD48
        CODE_SIGN_STYLE: Manual
        ARCHS: arm64
        VALID_ARCHS: arm64
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"

  # macOS Widgets
  SaneSalesWidgets:
    type: app-extension
    platform: macOS
    bundleId: com.sanesales.app.widgets
    deploymentTarget:
      macOS: 14.0
    entitlements:
      path: Widgets/SaneSalesWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - "group.com.sanesales.app"
    sources:
      - Widgets
      - path: Core/Models
        excludes:
          - "**/CLAUDE.md"
      - Core/Services/SharedStore.swift
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: SaneSales Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: SaneSalesWidgets
        PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.widgets
        MARKETING_VERSION: "1.2.6"
        CURRENT_PROJECT_VERSION: "1206"
        SWIFT_VERSION: 6.0
        DEVELOPMENT_TEAM: M78L6FXD48
        ARCHS: arm64
        VALID_ARCHS: arm64
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks @executable_path/../../../../Frameworks"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.dev.widgets
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.widgets
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "SaneSales Widgets Developer ID"
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.widgets
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneSales Widgets Mac App Store"

  # iOS App
  SaneSalesIOS:
    type: application
    platform: iOS
    bundleId: com.sanesales.app
    deploymentTarget:
      iOS: 17.0
    sources:
      - path: iOS
        excludes:
          - "**/CLAUDE.md"
      - path: Core
        excludes:
          - "**/CLAUDE.md"
      - Resources
    dependencies:
      - package: SaneUI
      - target: SaneSalesWatch
        embed: true
        codeSign: true
      - target: SaneSalesIOSWidgets
        embed: true
        codeSign: true
    entitlements:
      path: iOS/SaneSalesIOS.entitlements
      properties:
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.sanesales.app"
        com.apple.security.application-groups:
          - "group.com.sanesales.app"
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: SaneSales
        AppStoreProductID: "com.sanesales.app.pro.unlock.v2"
        UIPrefersShowingLanguageSettings: true
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: "public.app-category.finance"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_NAME: SaneSales
        PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
        MARKETING_VERSION: "1.2.6"
        CURRENT_PROJECT_VERSION: "1206"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: 6.0
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        TARGETED_DEVICE_FAMILY: "1,2"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        DEVELOPMENT_TEAM: M78L6FXD48
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.dev
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneSales iOS App Store"
          OTHER_SWIFT_FLAGS: "-D APP_STORE"

  # iOS Tests
  SaneSalesIOSTests:
    type: bundle.unit-test
    platform: iOS
    bundleId: com.sanesales.appTests.ios
    deploymentTarget:
      iOS: 17.0
    testTarget: SaneSalesIOS
    sources:
      - Tests
    dependencies:
      - target: SaneSalesIOS
    settings:
      base:
        DEVELOPMENT_TEAM: M78L6FXD48
        CODE_SIGN_STYLE: Manual
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SaneSales.app/SaneSales"
        BUNDLE_LOADER: "$(BUILT_PRODUCTS_DIR)/SaneSales.app/SaneSales"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"

  # iOS UI Tests
  SaneSalesIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    bundleId: com.sanesales.appUITests.ios
    deploymentTarget:
      iOS: 17.0
    testTarget: SaneSalesIOS
    sources:
      - SaneSalesUITests
    dependencies:
      - target: SaneSalesIOS
    settings:
      base:
        DEVELOPMENT_TEAM: M78L6FXD48
        CODE_SIGN_STYLE: Manual
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"

  # iOS Widgets
  SaneSalesIOSWidgets:
    type: app-extension
    platform: iOS
    bundleId: com.sanesales.app.ioswidgets
    deploymentTarget:
      iOS: 17.0
    entitlements:
      path: Widgets/SaneSalesWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - "group.com.sanesales.app"
    sources:
      - Widgets
      - path: Core/Models
        excludes:
          - "**/CLAUDE.md"
      - Core/Services/SharedStore.swift
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: SaneSales Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: SaneSalesIOSWidgets
        PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.ioswidgets
        MARKETING_VERSION: "1.2.6"
        CURRENT_PROJECT_VERSION: "1206"
        SWIFT_VERSION: 6.0
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        TARGETED_DEVICE_FAMILY: "1,2"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        DEVELOPMENT_TEAM: M78L6FXD48
        SKIP_INSTALL: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.dev.ioswidgets
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.ioswidgets
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.ioswidgets
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneSales iOS Widgets App Store"

  # watchOS App (read-only companion)
  SaneSalesWatch:
    type: application
    platform: watchOS
    bundleId: com.sanesales.app.watch
    deploymentTarget:
      watchOS: 10.0
    sources:
      - path: Watch
        excludes:
          - "**/CLAUDE.md"
      - path: Core/Models
        excludes:
          - "**/CLAUDE.md"
      - Core/Services/SharedStore.swift
      - Resources/Assets.xcassets
    dependencies:
      - target: SaneSalesWatchWidgets
        embed: true
        codeSign: true
    entitlements:
      path: Watch/SaneSalesWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - "group.com.sanesales.app"
    info:
      path: Watch/Info.plist
      properties:
        CFBundleDisplayName: SaneSales
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_NAME: SaneSalesWatch
        PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.watch
        MARKETING_VERSION: "1.2.6"
        CURRENT_PROJECT_VERSION: "1206"
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchAppIcon
        SWIFT_VERSION: 6.0
        WATCHOS_DEPLOYMENT_TARGET: 10.0
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: M78L6FXD48
        INFOPLIST_KEY_CFBundleIconName: WatchAppIcon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.dev.watch
          INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.sanesales.dev
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.watch
          INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.sanesales.app
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.watch
          INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.sanesales.app
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneSales Watch App Store"

  # watchOS Widget extension (Smart Stack)
  SaneSalesWatchWidgets:
    type: app-extension
    platform: watchOS
    bundleId: com.sanesales.app.watch.widgets
    deploymentTarget:
      watchOS: 10.0
    entitlements:
      path: Watch/SaneSalesWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - "group.com.sanesales.app"
    sources:
      - path: Widgets
        excludes:
          - Info.plist
      - path: Core/Models
        excludes:
          - "**/CLAUDE.md"
      - Core/Services/SharedStore.swift
    info:
      path: Watch/WidgetInfo.plist
      properties:
        CFBundleDisplayName: SaneSales Watch Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: SaneSalesWatchWidgets
        PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.watch.widgets
        MARKETING_VERSION: "1.2.6"
        CURRENT_PROJECT_VERSION: "1206"
        SWIFT_VERSION: 6.0
        WATCHOS_DEPLOYMENT_TARGET: 10.0
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: M78L6FXD48
        SKIP_INSTALL: YES
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.dev.watch.widgets
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.watch.widgets
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanesales.app.watch.widgets
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneSales Watch Widgets App Store"
