  - Verify the selected section renders the expected customer content and preserves
    window sizing.
  assertions:
  - Every shipped primary section is reachable from the platform navigation.
  - Settings routing from in-app and macOS menu entry points lands in the same Settings
    surface.
  - No section is a decorative or dead tab.
